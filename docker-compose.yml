services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"    # localhost only — not exposed to the network
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poller -d codesystem_poller"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Run SQL migrations on startup ──────────────────────
  migrate:
    image: postgres:18-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      sh -c '
        for f in /migrations/*.sql; do
          echo "Applying $$f ..."
          PGPASSWORD=${POSTGRES_PASSWORD} psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f "$$f"
        done
        echo "Migrations done."
      '

  # ── RabbitMQ ────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    hostname: rabbitmq
    user: rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: "codesystem-poller-cookie"
    ports:
      - "127.0.0.1:5672:5672"        # localhost only
      - "127.0.0.1:15672:15672"      # management UI — localhost only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Poller service ──────────────────────────────────────
  poller:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    volumes:
      - ./codesystems.yml:/app/codesystems.yml:ro
    restart: unless-stopped

  # ── FHIR Forwarder (optional) ──────────────────────────
  # Consumes Bundles from RabbitMQ and POSTs them to a
  # downstream FHIR $process-message endpoint.
  # Disabled by default — enable with:
  #   docker compose --profile forwarder up -d
  fhir-forwarder:
    build: .
    command: ["python", "-m", "src.fhir_forwarder"]
    profiles:
      - forwarder
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: codesystem.changes
      RABBITMQ_QUEUE: fhir-forwarder
      RABBITMQ_ROUTING_KEY: "codesystem.#"
      FHIR_TARGET_URL: ${FHIR_TARGET_URL:-http://localhost:8080/fhir/$$process-message}
      FHIR_AUTH_TOKEN: ${FHIR_AUTH_TOKEN:-}
      MAX_RETRIES: "3"
      RETRY_DELAY: "5"
      LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  pgdata:
